<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - Games Store</title>
    <style>
        :root {
            --bg-top: #0f172a; 
            --bg-bottom: #020617;
            --panel-bg: rgba(23, 37, 84, 0.5); 
            --primary-blue: #3B82F6;
            --text-light: #F3F4F6; 
            --text-muted: #9CA3AF;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        header {
            background-color: transparent;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo-container { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .logo-container img { width: 40px; height: 40px; border-radius: 50%; background-color: #fff; object-fit: cover; }
        
        .nav-links { 
            display: flex; gap: 30px; background: rgba(255, 255, 255, 0.1); 
            padding: 10px 30px; border-radius: 30px; backdrop-filter: blur(10px);
        }
        .nav-links a { color: var(--text-light); text-decoration: none; font-weight: bold; font-size: 0.85rem; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary-blue); }

        .auth-bg-fade {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0.5;
            -webkit-mask-image: linear-gradient(to bottom, black 25%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 25%, transparent 100%);
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px;
            z-index: 10;
        }

        .auth-box { 
            background: var(--panel-bg); 
            backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-logo {
            width: 70px; height: 70px; margin-bottom: 20px; border-radius: 50%; border: 2px solid var(--primary-blue); padding: 5px;
        }

        .auth-box h2 {
            margin-top: 0;
            color: #fff;
            font-size: 2.2rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group { position: relative; width: 100%; margin-bottom: 20px; }

        input { 
            width: 100%; 
            box-sizing: border-box;
            padding: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            background: rgba(10, 13, 28, 0.7); 
            color: #fff;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--primary-blue); background: rgba(10, 13, 28, 0.9); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        .image-upload-box {
            width: 150px; 
            height: 150px; 
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px; 
            background: rgba(10, 13, 28, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin: 0 auto 30px; 
            transition: all 0.3s ease;
        }
        
        .image-upload-box:hover {
            border-color: var(--primary-blue);
            background: rgba(10, 13, 28, 0.9);
            transform: scale(1.02);
        }

        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            pointer-events: none;
            padding: 10px;
            font-size: 0.9rem; 
        }

        .upload-placeholder .plus-icon {
            font-size: 2.5rem; 
            color: var(--primary-blue);
            margin-bottom: 10px;
            line-height: 1;
        }

        .image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: none;
            z-index: 2;
        }

        input[type="file"] {
            display: none;
        }

        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--text-muted); display: flex; align-items: center; transition: color 0.3s;
        }
        .eye-icon:hover { color: var(--primary-blue); }

        .submit-btn { 
            width: 100%; padding: 16px; margin-top: 10px;
            background: var(--primary-blue); color: white; border: none; 
            border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: bold;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        .submit-btn:hover { background: #2563eb; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.5); }

        .toggle-text { color: var(--text-muted); margin-top: 25px; font-size: 0.95rem; }
        .toggle-text a { color: var(--primary-blue); text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .toggle-text a:hover { color: #fff; text-shadow: 0 0 10px var(--primary-blue); }

        .msg { margin-top: 15px; font-size: 0.9rem; min-height: 20px; font-weight: 500; }
        .error { color: #ef4444; }
        .success { color: #10b981; }

        .form-section { display: none; }
        .form-section.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        footer { background-color: rgba(0,0,0,0.5); text-align: center; padding: 20px; color: var(--text-muted); border-top: 1px solid rgba(30, 58, 138, 0.2); margin-top: auto; }
    </style>
</head>
<body>

    <div class="auth-bg-fade"></div>

    <header>
        <div class="logo-container" onclick="window.location.href='/index.html'">
            <img src="https://i.pinimg.com/736x/68/0e/d9/680ed9ad3e25665eb9f5d9f598a119b7.jpg" alt="Logo">
            Games Store
        </div>
    </header>

    <div class="main-content">
        <div class="auth-box">
            <img src="https://i.pinimg.com/736x/68/0e/d9/680ed9ad3e25665eb9f5d9f598a119b7.jpg" class="auth-logo" alt="Store Logo">

            <div id="loginSection" class="form-section active">
                <h2>Sign In</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="email" id="loginEmail" placeholder="Email Address" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <span class="eye-icon" onclick="togglePassword('loginPassword', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>

                    <button type="submit" class="submit-btn">Login</button>
                </form>
                <div id="loginMsg" class="msg"></div>
                <p class="toggle-text">Don't have an account? <a onclick="showRegister()">Create one</a></p>
            </div>

            <div id="registerSection" class="form-section">
                <h2>Sign Up</h2>
                <form id="registerForm" enctype="multipart/form-data">
                    
                    <div class="image-upload-box" onclick="document.getElementById('regImage').click()">
                        <div class="upload-placeholder" id="uploadPlaceholder">
                            <span class="plus-icon">+</span>
                            <span>Choose image</span>
                        </div>
                        <img id="imagePreview" class="image-preview" src="" alt="Preview">
                        <input type="file" id="regImage" name="image" accept="image/*" required>
                    </div>

                    <div class="input-group">
                        <input type="text" id="regName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="regEmail" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="regPassword" placeholder="Password" required>
                        <span class="eye-icon" onclick="togglePassword('regPassword', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
                <div id="regMsg" class="msg"></div>
                <p class="toggle-text">Already have an account? <a onclick="showLogin()">Sign In</a></p>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Games Store. All rights reserved.</p>
    </footer>

    <script>
        function showRegister() {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.add('active');
            document.getElementById('loginMsg').innerText = '';
            document.getElementById('regMsg').innerText = '';
        }

        function showLogin() {
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
            document.getElementById('loginMsg').innerText = '';
            document.getElementById('regMsg').innerText = '';
        }

        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

            if (input.type === 'password') {
                input.type = 'text'; 
                iconElement.innerHTML = eyeClosed; 
            } else {
                input.type = 'password'; 
                iconElement.innerHTML = eyeOpen; 
            }
        }

        document.getElementById('regImage').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    const placeholder = document.getElementById('uploadPlaceholder');
                    
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgBox = document.getElementById('loginMsg');

            try {
                const response = await fetch('/users/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.data.name); 
                    window.location.href = '/index.html'; 
                } else {
                    msgBox.className = 'msg error';
                    msgBox.innerText = data.message || "Login failed";
                }
            } catch (err) { console.error(err); msgBox.innerText = "Network error, please try again."; }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('regMsg');

            const formData = new FormData();
            formData.append('name', document.getElementById('regName').value);
            formData.append('email', document.getElementById('regEmail').value);
            formData.append('password', document.getElementById('regPassword').value);
            
            const imageFile = document.getElementById('regImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const response = await fetch('/users/signup', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok || response.status === 201) {
                    msgBox.className = 'msg success';
                    msgBox.innerText = "Account created successfully! You can now log in.";
                    
                    document.getElementById('registerForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    document.getElementById('imagePreview').src = '';
                    document.getElementById('uploadPlaceholder').style.display = 'flex';

                    setTimeout(() => { showLogin(); }, 2000);
                } else {
                    msgBox.className = 'msg error';
                    msgBox.innerText = (data.err && data.err.length > 0) ? data.err[0].message : (data.message || "Registration failed");
                }
            } catch (err) { console.error(err); msgBox.className = 'msg error'; msgBox.innerText = "Network error, please try again."; }
        });
    </script>
</body>
</html>
