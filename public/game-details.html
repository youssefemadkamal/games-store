<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Details - Games Store</title>
    <style>
      :root {
        --bg-top: #0f172a;
        --bg-bottom: #020617;
        --panel-bg: rgba(23, 37, 84, 0.4);
        --primary-blue: #3b82f6;
        --text-light: #f3f4f6;
        --text-muted: #9ca3af;
        --star-color: #f59e0b;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: var(--text-light);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        background-color: transparent;
        padding: 20px 50px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        position: absolute;
        top: 0;
        width: 100%;
        box-sizing: border-box;
        z-index: 100;
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
      }
      .logo-container img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #fff;
        object-fit: cover;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        background: rgba(255, 255, 255, 0.1);
        padding: 10px 30px;
        border-radius: 30px;
        backdrop-filter: blur(10px);
        justify-content: center;
      }
      .nav-links a {
        color: var(--text-light);
        text-decoration: none;
        font-weight: bold;
        font-size: 0.95rem;
        transition: color 0.3s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary-blue);
      }

      .header-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .logout-btn {
        background-color: #ef4444;
        color: white !important;
        padding: 10px 20px;
        border-radius: 20px;
        font-weight: bold;
        text-decoration: none;
        transition: background 0.3s;
      }
      .logout-btn:hover {
        background-color: #dc2626;
      }

      .page-banner {
        width: 100%;
        height: 500px;
        background-size: cover;
        background-position: center;
        position: relative;
        -webkit-mask-image: linear-gradient(
          to bottom,
          black 60%,
          transparent 100%
        );
        mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      }

      .page-banner::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(15, 23, 42, 0.4),
          var(--bg-top)
        );
      }

      .details-container {
        display: flex;
        gap: 40px;
        padding: 0 40px 60px;
        max-width: 1300px;
        margin: -150px auto 0; 
        position: relative;
        z-index: 10;
        width: 100%;
        box-sizing: border-box;
        flex-wrap: wrap;
      }

      .game-poster {
        flex: 1;
        min-width: 320px;
      }
      .game-poster img {
        width: 100%;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .game-info {
        flex: 2;
        min-width: 350px;
      }
      .game-info h1 {
        font-size: 3.5rem;
        margin: 0 0 15px;
        color: #fff;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      }

      .badges {
        display: flex;
        gap: 12px;
        margin-bottom: 25px;
      }
      .badge {
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.3);
        padding: 6px 18px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: bold;
      }
      .rating-badge {
        color: var(--star-color);
        background: rgba(245, 158, 11, 0.1);
        border-color: rgba(245, 158, 11, 0.3);
      }

      .description {
        font-size: 1.15rem;
        line-height: 1.7;
        color: var(--text-muted);
        margin-bottom: 30px;
      }
      .price {
        font-size: 2.8rem;
        color: #10b981;
        font-weight: bold;
        margin-bottom: 30px;
      }

      .add-to-cart-btn {
        background: var(--primary-blue);
        color: white;
        border: none;
        padding: 18px 50px;
        border-radius: 12px;
        font-size: 1.3rem;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
      }
      .add-to-cart-btn:hover {
        transform: translateY(-5px);
        background: #2563eb;
        box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        margin-top: 40px;
      }

      .glass-card h2 {
        margin-top: 0;
        font-size: 1.6rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 15px;
        margin-bottom: 25px;
      }

      .req-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
      }
      .req-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .req-item span.label {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .req-item span.value {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 500;
      }

      .rate-section {
        margin-top: 30px;
        text-align: center;
      }
      .stars {
        display: flex;
        gap: 8px;
        flex-direction: row-reverse;
        justify-content: center;
        margin-top: 10px;
      }
      
      .stars input {
        display: none;
      }
      
      .stars label {
        font-size: 2.5rem;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .stars input:checked ~ label,
      .stars label:hover,
      .stars label:hover ~ label {
        color: var(--star-color);
        transform: scale(1.1);
      }

      footer {
        background-color: rgba(0, 0, 0, 0.5);
        text-align: center;
        padding: 20px;
        color: var(--text-muted);
        border-top: 1px solid rgba(30, 58, 138, 0.2);
        margin-top: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <div
        class="logo-container"
        onclick="window.location.href = '/index.html'"
      >
        <img
          src="https://i.pinimg.com/736x/68/0e/d9/680ed9ad3e25665eb9f5d9f598a119b7.jpg"
          alt="Logo"
        />
        Games Store
      </div>
      <div class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/index.html#store-section">Store</a>
        <a href="/favorites.html">Favorites</a>
        <a href="/cart.html">Cart</a>
        <a href="/dashboard.html" id="dashboardLink" style="display: none; color: #f59e0b;">Dashboard</a>
      </div>
      <div class="header-actions">
        <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
      </div>
    </header>

    <div class="page-banner" id="dynamicBanner"></div>

    <div class="details-container">
      <div class="game-poster">
        <img id="gameImage" src="" alt="Game Image" />

        <div class="glass-card rate-section">
          <h3>Rate your experience</h3>
          <div class="stars">
            <input type="radio" name="rate" id="star5" value="5" /><label
              for="star5"
              onclick="submitRate(5)"
              >★</label
            >
            <input type="radio" name="rate" id="star4" value="4" /><label
              for="star4"
              onclick="submitRate(4)"
              >★</label
            >
            <input type="radio" name="rate" id="star3" value="3" /><label
              for="star3"
              onclick="submitRate(3)"
              >★</label
            >
            <input type="radio" name="rate" id="star2" value="2" /><label
              for="star2"
              onclick="submitRate(2)"
              >★</label
            >
            <input type="radio" name="rate" id="star1" value="1" /><label
              for="star1"
              onclick="submitRate(1)"
              >★</label
            >
          </div>
        </div>
      </div>

      <div class="game-info">
        <h1 id="gameTitle">Loading...</h1>
        <div class="badges">
          <span id="gameCategory" class="badge"></span>
          <span id="gameRating" class="badge rating-badge"
            >⭐ 0.0 (0 reviews)</span
          >
        </div>

        <p id="gameDesc" class="description"></p>
        <p id="gamePrice" class="price">$0.00</p>

        <button id="cartBtn" class="add-to-cart-btn">Add to Cart</button>

        <div class="glass-card">
          <h2>System Requirements</h2>
          <div class="req-grid">
            <div class="req-item">
              <span class="label">OS</span
              ><span class="value" id="reqOs">-</span>
            </div>
            <div class="req-item">
              <span class="label">Processor</span
              ><span class="value" id="reqProcessor">-</span>
            </div>
            <div class="req-item">
              <span class="label">Memory</span
              ><span class="value" id="reqMemory">-</span>
            </div>
            <div class="req-item">
              <span class="label">Graphics</span
              ><span class="value" id="reqGraphics">-</span>
            </div>
            <div class="req-item">
              <span class="label">Storage</span
              ><span class="value" id="reqStorage">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Games Store. All rights reserved.</p>
    </footer>

    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/login.html";

      async function checkAdminStatus() {
            try {
                const response = await fetch('/users/me', {
                    headers: { 'token': token }
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    if (userData.role === 'admin') {
                        document.getElementById('dashboardLink').style.display = 'inline-block';
                    }
                }
            } catch (error) {}
        }
        checkAdminStatus();

      const urlParams = new URLSearchParams(window.location.search);
      const gameId = urlParams.get("id");
      if (!gameId) window.location.href = "/index.html";

      document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/login.html';
        });

      async function loadGameDetails() {
        try {
          const response = await fetch(`/games/${gameId}`);
          let game = await response.json();
          const gameData = game.data || game.game || game;

          const imgUrl = gameData.image || "https://via.placeholder.com/600";
          document.getElementById("gameImage").src = imgUrl;
          document.getElementById("dynamicBanner").style.backgroundImage =
            `url('${imgUrl}')`;

          document.getElementById("gameTitle").innerText =
            gameData.title || "Unknown Game";
          document.getElementById("gameCategory").innerText =
            gameData.category || "General";
          document.getElementById("gameDesc").innerText =
            gameData.description || "No description available.";
          document.getElementById("gamePrice").innerText =
            `$${gameData.price || 0}`;

          const reqs = gameData.requirements || {};
          document.getElementById("reqOs").innerText =
            reqs.os || "Windows 10 64-bit";
          document.getElementById("reqProcessor").innerText =
            reqs.processor || "Intel i5 / AMD Equivalent";
          document.getElementById("reqMemory").innerText =
            reqs.memory || "8GB RAM";
          document.getElementById("reqGraphics").innerText =
            reqs.graphics || "GTX 1060 / Equivalent";
          document.getElementById("reqStorage").innerText =
            reqs.storage || "50 GB";

          document.getElementById("cartBtn").onclick = (e) =>
            addToCart(e, gameData._id);
          fetchGameRates();
        } catch (error) {
        }
      }

      async function fetchGameRates() {
        try {
          const response = await fetch(`/rate/${gameId}`);
          if (response.ok) {
            const rates = await response.json();
            if (rates && rates.length > 0) {
              const sum = rates.reduce((acc, curr) => acc + curr.rate, 0);
              const average = (sum / rates.length).toFixed(1);
              document.getElementById("gameRating").innerText =
                `⭐ ${average} (${rates.length} reviews)`;
            }
          }
        } catch (e) {
        }
      }

      async function submitRate(value) {
        try {
          const response = await fetch("/rate", {
            method: "POST",
            headers: { "Content-Type": "application/json", token: token },
            body: JSON.stringify({ GameId: gameId, rate: value }),
          });
          if (response.ok) {
            alert("Rating submitted! 🎮");
            fetchGameRates();
          }
        } catch (e) {
        }
      }

      async function addToCart(event, gId) {
        const btn = event.target;
        btn.innerText = "Adding...";
        try {
          const response = await fetch("/cart", {
            method: "POST",
            headers: { "Content-Type": "application/json", token: token },
            body: JSON.stringify({ GameId: gId, quantity: 1 }),
          });
          if (response.ok) {
            btn.innerText = "Added! ✔️";
            btn.style.background = "#10b981";
            setTimeout(() => {
              btn.innerText = "Add to Cart";
              btn.style.background = "";
            }, 2000);
          }
        } catch (e) {
        }
      }

      loadGameDetails();
    </script>
  </body>
</html>
